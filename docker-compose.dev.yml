# 開発環境用: ホットリロード有効
# 使い方: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/app       # コード変更をライブ反映
      - db_data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"                  # 開発時はバックエンドも直接公開

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
